<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="images/logo_transparent.png">
  <title>Your Dandeli, Your Way</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --forest: #1a3a2a;
      --moss: #2d5a3d;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --cream: #f5f0e8;
      --sand: #e8dfc8;
      --text: #1a1a1a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'Jost', sans-serif;
      background: var(--cream);
      color: var(--text);
      overflow-x: hidden;
    }

    /* CURSOR */
    .cursor,
    .cursor-f {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      top: 0;
      left: 0;
    }

    .cursor {
      width: 10px;
      height: 10px;
      background: var(--gold);
      margin-top: -5px;
      margin-left: -5px;
      transition: transform .08s;
    }

    .cursor-f {
      width: 36px;
      height: 36px;
      border: 1.5px solid var(--gold);
      opacity: .5;
      margin-top: -18px;
      margin-left: -18px;
      transition: opacity .3s;
    }

    @media(hover:none) {

      .cursor,
      .cursor-f {
        display: none;
      }
    }

    /* TOPBAR */
    .topbar {
      background: var(--forest);
      color: #bbb;
      padding: 8px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
    }

    .topbar a {
      color: #bbb;
      text-decoration: none;
      transition: color .3s;
    }

    .topbar a:hover {
      color: var(--gold);
    }

    .tb-r {
      display: flex;
      gap: 20px;
      align-items: center;
    }

    .soc {
      width: 26px;
      height: 26px;
      border: 1px solid rgba(255, 255, 255, .3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #bbb;
      text-decoration: none;
      font-size: 11px;
      transition: all .3s;
    }

    .soc:hover {
      background: var(--gold);
      border-color: var(--gold);
      color: #fff;
      transform: rotate(15deg) scale(1.2);
    }

    .bnow {
      background: var(--gold);
      color: #fff !important;
      padding: 6px 18px;
      font-weight: 500;
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-decoration: none;
      position: relative;
      overflow: hidden;
    }

    .bnow::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, .25);
      transform: translateX(-110%) skewX(-15deg);
      transition: transform .4s;
    }

    .bnow:hover::after {
      transform: translateX(110%) skewX(-15deg);
    }

    /* NAV */
    nav {
      background: #fff;
      padding: 0 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 20px rgba(0, 0, 0, .08);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      height: auto;
      min-height: 52px;
      padding: 4px 0;
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--forest);
      text-decoration: none;
    }

    .leaf {
      font-size: 26px;
      animation: sway 3s ease-in-out infinite;
    }

    @keyframes sway {

      0%,
      100% {
        transform: rotate(-5deg);
      }

      50% {
        transform: rotate(5deg);
      }
    }

    .nl {
      display: flex;
      list-style: none;
    }

    /* ── KEY FIX: li must be position:relative so .dd positions against it ── */
    .nl>li {
      position: relative;
    }

    .nl>li>a {
      display: block;
      padding: 22px 15px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: .5px;
      text-transform: uppercase;
      color: var(--text);
      text-decoration: none;
      transition: color .3s;
      position: relative;
    }

    .nl>li>a::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      right: 50%;
      height: 3px;
      background: var(--gold);
      transition: left .3s, right .3s;
    }

    .nl>li>a:hover::after,
    .nl>li>a.act::after {
      left: 0;
      right: 0;
    }

    .nl>li>a:hover,
    .nl>li>a.act {
      color: var(--moss);
    }

    /* ── KEY FIX: hover on <li> shows .dd which is now a sibling of <a>, not inside it ── */
    .nl>li:hover .dd {
      display: block;
      animation: dds .2s ease;
    }

    @keyframes dds {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    .dd {
      display: none;
      position: absolute;
      top: 100%;
      left: 0;
      background: #fff;
      min-width: 220px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, .12);
      border-top: 3px solid var(--gold);
      z-index: 200;
    }

    .dd a {
      display: block;
      padding: 10px 20px;
      font-size: 13px;
      color: var(--text);
      text-decoration: none;
      transition: all .2s;
      border-bottom: 1px solid #f0f0f0;
    }

    .dd a:hover {
      background: var(--sand);
      color: var(--moss);
      padding-left: 26px;
    }

    .hbg {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 10px;
    }

    .hbg span {
      width: 22px;
      height: 2px;
      background: var(--forest);
      display: block;
      transition: all .3s;
    }

    .mob {
      position: fixed;
      inset: 0;
      background: var(--forest);
      z-index: 500;
      padding: 80px 40px;
      transform: translateX(100%);
      transition: transform .4s cubic-bezier(.77, 0, .175, 1);
    }

    .mob.open {
      transform: none;
    }

    .mob a {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px;
      color: #fff;
      text-decoration: none;
      padding: 14px 0;
      border-bottom: 1px solid rgba(255, 255, 255, .1);
      transition: color .3s;
    }

    .mob a:hover {
      color: var(--gold);
    }

    .mob-x {
      position: absolute;
      top: 24px;
      right: 30px;
      font-size: 28px;
      color: #fff;
      cursor: pointer;
      background: none;
      border: none;
    }

    /* PAGE INTRO */
    .page-intro {
      background: var(--forest);
      padding: 52px 60px 48px;
      position: relative;
      overflow: hidden;
      border-bottom: 1px solid rgba(201, 168, 76, .12);
    }

    .page-intro::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: .3;
      pointer-events: none;
    }

    .pi-forest {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 60px;
      pointer-events: none;
      overflow: hidden;
    }

    .pi-forest svg {
      position: absolute;
      bottom: 0;
      width: 200%;
      animation: fPan 30s linear infinite;
    }

    @keyframes fPan {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(-50%);
      }
    }

    .pi-inner {
      position: relative;
      z-index: 2;
      max-width: 1240px;
      margin: 0 auto;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 40px;
      flex-wrap: wrap;
    }

    .pi-bc {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, .25);
      margin-bottom: 14px;
    }

    .pi-bc a {
      color: rgba(201, 168, 76, .5);
      text-decoration: none;
      transition: color .2s;
    }

    .pi-bc a:hover {
      color: var(--gold);
    }

    .pi-bc-sep {
      margin: 0 8px;
      opacity: .3;
    }

    .pi-eyebrow {
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: rgba(201, 168, 76, .55);
      font-style: italic;
      margin-bottom: 12px;
      opacity: 0;
      animation: su .7s .15s ease forwards;
    }

    .pi-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(36px, 5vw, 64px);
      font-weight: 300;
      color: #fff;
      letter-spacing: 2px;
      line-height: 1.1;
      opacity: 0;
      animation: su .9s .25s cubic-bezier(.22, 1, .36, 1) forwards;
    }

    .pi-title em {
      color: var(--gold);
      font-style: italic;
    }

    .pi-sub {
      font-family: 'Cormorant Garamond', serif;
      font-size: 16px;
      font-style: italic;
      color: rgba(255, 255, 255, .3);
      margin-top: 10px;
      letter-spacing: 1px;
      opacity: 0;
      animation: su .7s .5s ease forwards;
    }

    .pi-right {
      display: flex;
      gap: 40px;
      opacity: 0;
      animation: su .7s .55s ease forwards;
      flex-shrink: 0;
    }

    .pi-stat {
      text-align: center;
    }

    .pi-stat-n {
      font-family: 'Cormorant Garamond', serif;
      font-size: 36px;
      font-weight: 300;
      color: #fff;
      line-height: 1;
    }

    .pi-stat-l {
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(201, 168, 76, .6);
      margin-top: 3px;
    }

    .pi-div {
      width: 1px;
      height: 44px;
      background: rgba(255, 255, 255, .1);
      align-self: center;
    }

    .pi-ornament {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 18px;
      opacity: 0;
      animation: su .6s .7s ease forwards;
    }

    .pi-line {
      height: .5px;
      background: rgba(201, 168, 76, .3);
      width: 40px;
    }

    .pi-diamond {
      width: 6px;
      height: 6px;
      background: var(--gold);
      transform: rotate(45deg);
    }

    @keyframes su {
      to {
        opacity: 1;
        transform: none;
      }
    }
